<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="favG" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#4c1d95" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- brand tile -->
  <rect width="512" height="512" rx="112" fill="url(#favG)"/>

  <!-- waveform mark -->
  <g fill="#ffffff" filter="url(#soft)">
    <rect x="98"  y="221" width="28" height="70"  rx="14"/>
    <rect x="146" y="186" width="28" height="140" rx="14"/>
    <rect x="194" y="146" width="28" height="220" rx="14"/>
    <rect x="242" y="116" width="28" height="280" rx="14"/>
    <rect x="290" y="146" width="28" height="220" rx="14"/>
    <rect x="338" y="186" width="28" height="140" rx="14"/>
    <rect x="386" y="221" width="28" height="70"  rx="14"/>
  </g>
</svg>
